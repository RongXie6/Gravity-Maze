name: labirinto
description: Gioco del labirinto — versione completa

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  
  sensors_plus: ^4.0.2        
  shared_preferences: ^2.2.2    # Persistenza locale (utenti, salvataggi, stelle)

  # ── Dipendenze aggiuntive ─────────────────────────
  crypto: ^3.0.3                # Hash SHA-256 per le password (login/registrazione)

  audioplayers: ^6.1.0          # Effetti sonori + musica di sottofondo

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Per font personalizzati, decommentare e inserire i file in assets/fonts/
  # fonts:
  #   - family: serif
  #     fonts:
  #       - asset: assets/fonts/Lora-Regular.ttf
  #       - asset: assets/fonts/Lora-Bold.ttf
  #         weight: 700

  assets:
    - assets/audio/
