name: labirinto
description: 迷宫游戏 — 全面升级版

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── 原有依赖 ──────────────────────────────────────
  sensors_plus: ^4.0.2          # 加速度传感器
  shared_preferences: ^2.2.2    # 本地数据持久化（存储用户、存档、星级）

  # ── 新增依赖 ──────────────────────────────────────
  crypto: ^3.0.3                # SHA-256 密码哈希（登录/注册）

  # 音效（选其一）
  # audioplayers: ^5.2.1        # 如需音效，取消注释此行
  # flutter_sound: ^9.2.13      # 备选：支持更多音频格式

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 如需自定义字体，取消注释并将字体文件放入 assets/fonts/
  # fonts:
  #   - family: serif
  #     fonts:
  #       - asset: assets/fonts/Lora-Regular.ttf
  #       - asset: assets/fonts/Lora-Bold.ttf
  #         weight: 700

  assets:
    # 如有音效文件，在此添加：
    # - assets/sounds/star.mp3
    # - assets/sounds/win.mp3
    # - assets/sounds/fall.mp3
